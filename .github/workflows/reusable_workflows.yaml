name: reusable_workflows
on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20'

jobs:
  build: 
    runs-on: ubunutu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/node-setup@v4
        with:
          node-version: ${{inputs.node_version}}

      - name: cache npm depedencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys:
            ${{runner.os}}-node-

      - name: Install depedencies
        run: npm ci

      - name: run build/test
        run: npm run build --if-present


  
